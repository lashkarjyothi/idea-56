# prod.yaml - Production Configuration Example

app:
  name: my-application
  environment: production
  debug: false

server:
  host: 0.0.0.0
  port: 8080

database:
  engine: postgresql
  host: db.prod.example.com
  port: 5432
  name: myapp_db
  user: prod_user
  password: secure_password

logging:
  level: INFO
  file: /var/log/myapp/app.log

cache:
  type: redis
  host: cache.prod.example.com
  port: 6379

security:
  enable_https: false
  allowed_hosts:
    - example.com
    - www.example.com
